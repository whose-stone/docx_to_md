<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueBytes | Contact Us</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script type="module" src="script.js" defer></script>
</head>

<body>

<header class="sticky">
    <div class="logo-image">
        <img src="assets/logos/bluebytes_logo_white_HL.png" alt="BlueBytes Logo">
    </div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
    </button>

    <nav id="mobileMenu" role="navigation" aria-label="Main menu">
        <a href="index.html">Home</a>
        <a href="about.html">Solutions</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div id="backdrop"></div>

<main>
    <section class="sleek-section fade-in contact-wrapper">
        <h2>Contact Us</h2>
        <p>Interested in partnering with BlueBytes? Reach out below.</p>

        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Agency / Organization</label>
                <input type="text" name="agency" required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="cta primary">Submit</button>
            <p id="formStatus" class="form-status"></p>
        </form>
    </section>
</main>

<footer>
    © 2026 BlueBytes. All rights reserved.
</footer>

</body>
</html>
